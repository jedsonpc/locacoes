<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f766e" />
    <meta name="description" content="Gestao completa de locacao: imoveis, clientes, agenda, contratos, financeiro, manutencao e relatorios." />
    <title>Locacoes | Gestao de Excelencia</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css?v=2.1.3" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">AL</div>
        <div>
          <strong>Locacoes</strong>
          <span>Gestao imobiliaria</span>
        </div>
      </div>
      <nav id="nav" class="nav"></nav>
      <div class="side-status">
        <span id="storageStatus">Salvo neste dispositivo</span>
        <small id="versionLabel">v2.0.0</small>
      </div>
    </aside>

    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow" id="pageKicker">Operacao imobiliaria</p>
          <h1 id="pageTitle">Painel</h1>
        </div>
        <div class="topbar-actions">
          <label class="search">
            <span aria-hidden="true">⌕</span>
            <input id="globalSearch" type="search" placeholder="Buscar clientes, imoveis, reservas..." />
          </label>
          <button id="quickAddBtn" class="primary-button" type="button">+ Novo registro</button>
        </div>
      </header>

      <div id="updateBanner" class="update-banner hidden">
        <span id="app-update-status">Aplicativo pronto para uso offline.</span>
        <button id="checkUpdateBtn" class="ghost-button" type="button">Verificar</button>
      </div>

      <section id="app" class="content"></section>
    </main>

    <dialog id="recordDialog" class="dialog">
      <form id="recordForm" method="dialog">
        <div class="dialog-head">
          <div>
            <p class="eyebrow">Cadastro rapido</p>
            <h2 id="dialogTitle">Novo registro</h2>
          </div>
          <button class="icon-button" value="cancel" aria-label="Fechar" type="submit">×</button>
        </div>
        <div id="formFields" class="form-grid"></div>
        <div class="dialog-actions">
          <button class="ghost-button" value="cancel" type="submit">Cancelar</button>
          <button id="saveRecordBtn" class="primary-button" value="default" type="submit">Salvar</button>
        </div>
      </form>
    </dialog>

    <input id="importFile" class="hidden" type="file" accept="application/json" />
    <div id="toast" class="toast hidden" role="status"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="supabase-config.js?v=2.1.3" defer></script>
    <script src="supabase-sync.js?v=2.1.3" defer></script>
    <script src="update-checker.js?v=2.1.3" defer></script>
    <script src="app.js?v=2.1.3" defer></script>
  </body>
</html>
